<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>SPEEDWAY · CreativeVerse</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0800;overflow:hidden;font-family:'Courier New',monospace;color:#fff;}
canvas{display:block;}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;}
#speedometer{position:absolute;bottom:28px;right:28px;text-align:right;}
#speed-num{font-size:64px;font-weight:900;color:#F5C518;line-height:1;text-shadow:0 0 20px rgba(245,197,24,.4);}
#speed-unit{font-size:11px;letter-spacing:4px;color:rgba(245,197,24,.4);}
#gear-display{position:absolute;bottom:100px;right:28px;font-size:28px;font-weight:900;color:rgba(245,197,24,.6);}
#lap-display{position:absolute;top:20px;left:50%;transform:translateX(-50%);text-align:center;}
#lap-num{font-size:48px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#fff,#F5C518);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
#lap-label{font-size:9px;letter-spacing:5px;color:rgba(255,255,255,.25);}
#position-display{position:absolute;top:20px;right:28px;text-align:right;}
#pos-num{font-size:28px;font-weight:900;color:#F5C518;}
#pos-label{font-size:8px;letter-spacing:4px;color:rgba(255,255,255,.25);}
#item-slot{position:absolute;bottom:28px;left:28px;width:64px;height:64px;background:rgba(0,0,0,.5);border:2px solid rgba(245,197,24,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:32px;}
#item-label{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.25);text-align:center;margin-top:6px;}
#timer-display{position:absolute;top:20px;left:28px;}
#lap-timer{font-size:24px;font-weight:900;color:#fff;}
#best-time{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:2px;}
#race-msg{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:80px;font-weight:900;letter-spacing:6px;opacity:0;transition:opacity .3s;text-shadow:0 0 40px currentColor;}
#minimap{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);border:1px solid rgba(255,255,255,.1);border-radius:50%;background:rgba(0,0,0,.6);}
#splash{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a1000 0%,#050400 70%);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;}
#splash h1{font-size:88px;font-weight:900;letter-spacing:10px;background:linear-gradient(135deg,#fff,#F5C518,#FB923C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.splash-tag{font-size:10px;letter-spacing:5px;color:rgba(255,255,255,.3);}
.ctrl-grid{display:flex;gap:20px;background:rgba(255,255,255,.03);border:1px solid rgba(245,197,24,.1);border-radius:12px;padding:14px 24px;}
.ci{display:flex;gap:7px;align-items:center;font-size:11px;}
.ck{background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.15);border-radius:4px;padding:2px 8px;font-size:9px;color:#F5C518;letter-spacing:1px;}
.cd{color:rgba(255,255,255,.3);}
#race-btn{padding:16px 56px;background:#F5C518;border:none;border-radius:10px;color:#000;font-size:18px;font-weight:900;letter-spacing:4px;cursor:pointer;transition:all .2s;font-family:'Courier New',monospace;}
#race-btn:hover{background:#E8A000;transform:scale(1.04);box-shadow:0 12px 40px rgba(245,197,24,.35);}
#finish-screen{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:80;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;backdrop-filter:blur(12px);}
#finish-screen h2{font-size:80px;font-weight:900;letter-spacing:8px;background:linear-gradient(135deg,#F5C518,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.fin-stat{font-size:14px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:3px;}
.fin-val{color:#F5C518;}
</style>
</head>
<body>
<canvas id="cvs"></canvas>
<div id="ui">
  <div id="lap-display"><div id="lap-num">1/3</div><div id="lap-label">LAP</div></div>
  <div id="timer-display"><div id="lap-timer">0:00.0</div><div id="best-time">BEST: —</div></div>
  <div id="speedometer"><div id="speed-num">0</div><div id="speed-unit">KM/H</div></div>
  <div id="gear-display">N</div>
  <div id="position-display"><div id="pos-num">1st</div><div id="pos-label">POSITION</div></div>
  <div id="item-slot">—<div id="item-label">ITEM</div></div>
  <div id="race-msg"></div>
  <canvas id="mm" width="120" height="120" id="minimap"></canvas>
</div>
<div id="splash">
  <h1>SPEEDWAY</h1>
  <div class="splash-tag">TOP-DOWN RACING · DRIFT · 3 LAPS · WIN</div>
  <div class="ctrl-grid">
    <div class="ci"><span class="ck">W / ↑</span><span class="cd">Accelerate</span></div>
    <div class="ci"><span class="ck">S / ↓</span><span class="cd">Brake/Reverse</span></div>
    <div class="ci"><span class="ck">A D / ←→</span><span class="cd">Steer</span></div>
    <div class="ci"><span class="ck">SPACE</span><span class="cd">Use Item</span></div>
  </div>
  <button id="race-btn">START RACE</button>
</div>
<div id="finish-screen">
  <h2>🏆 FINISHED!</h2>
  <div class="fin-stat">TIME: <span class="fin-val" id="fin-time">—</span></div>
  <div class="fin-stat">BEST LAP: <span class="fin-val" id="fin-best">—</span></div>
  <button style="padding:13px 40px;background:#F5C518;border:none;border-radius:9px;font-size:14px;font-weight:900;letter-spacing:3px;cursor:pointer;font-family:'Courier New',monospace;transition:all .2s" onclick="location.reload()">RACE AGAIN</button>
</div>
<script>
const params=new URLSearchParams(location.search);
const CU=params.get('user')||'racer';
const cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d');
let W,H;function rsz(){W=cvs.width=innerWidth;H=cvs.height=innerHeight;}rsz();window.addEventListener('resize',rsz);

// ── TRACK ───────────────────────────────────────────────────
// Track defined as a series of checkpoints (centerline)
const TRACK_POINTS=[
  {x:500,y:400},{x:600,y:200},{x:900,y:150},{x:1200,y:200},
  {x:1400,y:300},{x:1500,y:500},{x:1400,y:700},{x:1200,y:800},
  {x:1000,y:850},{x:800,y:900},{x:600,y:850},{x:400,y:750},
  {x:250,y:600},{x:200,y:450},{x:250,y:300},{x:400,y:200},
];
const TRACK_W=90;
const TOTAL_LAPS=3;

// Generate smooth track curve
function catmull(p0,p1,p2,p3,t){
  const t2=t*t,t3=t2*t;
  return{
    x:.5*(2*p1.x+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y:.5*(2*p1.y+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3),
  };
}
const N=TRACK_POINTS.length;
const smoothTrack=[];
for(let i=0;i<N;i++){
  const p0=TRACK_POINTS[(i-1+N)%N],p1=TRACK_POINTS[i],p2=TRACK_POINTS[(i+1)%N],p3=TRACK_POINTS[(i+2)%N];
  for(let t=0;t<1;t+=.05)smoothTrack.push(catmull(p0,p1,p2,p3,t));
}

// Items on track
const ITEMS_POOL=['⚡','🛢️','🔵','💣'];
let trackItems=Array.from({length:12},(_,i)=>{
  const idx=Math.floor(smoothTrack.length*i/12+20);
  const p=smoothTrack[idx%smoothTrack.length];
  return{x:p.x+(Math.random()-.5)*40,y:p.y+(Math.random()-.5)*40,type:ITEMS_POOL[Math.floor(Math.random()*ITEMS_POOL.length)],active:true};
});

// ── PLAYER ──────────────────────────────────────────────────
const sp=TRACK_POINTS[0];
const player={x:sp.x,y:sp.y+80,angle:-Math.PI/2,vel:0,steer:0,
  lap:1,checkpoint:0,lapTime:0,bestLap:Infinity,totalTime:0,
  item:null,boosted:0,spinning:0,health:3,finished:false,
  trail:[],driftAngle:0,lastCheckpoint:Date.now()};

// ── AI RACERS ───────────────────────────────────────────────
const AI_COLORS=['#F87171','#4ADE80','#C084FC'];
const aiCars=AI_COLORS.map((col,i)=>({
  x:sp.x+(i-1)*60,y:sp.y+160,angle:-Math.PI/2,vel:0,
  trackIdx:0,color:col,lap:1,checkpoint:0,wobble:Math.random()*Math.PI*2,name:['Racer A','Racer B','Racer C'][i],
  aiSpeed:.18+Math.random()*.04,
}));

// ── INPUT ────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')useItem();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// ── PHYSICS ─────────────────────────────────────────────────
function isOnTrack(x,y){
  for(let i=0;i<smoothTrack.length;i++){
    const p=smoothTrack[i];const dx=p.x-x,dy=p.y-y;
    if(dx*dx+dy*dy<TRACK_W*TRACK_W)return true;
  }
  return false;
}

function nearestTrackPoint(x,y){
  let best=0,bestD=Infinity;
  for(let i=0;i<smoothTrack.length;i++){
    const p=smoothTrack[i];const dx=p.x-x,dy=p.y-y,d=dx*dx+dy*dy;
    if(d<bestD){bestD=d;best=i;}
  }
  return best;
}

let raceStartTime=0,running=false,countdown=3;
let countdownTimer=0;
const particles=[];

function updatePlayer(dt){
  if(!running||player.finished)return;
  
  player.totalTime+=dt;
  player.lapTime+=dt;
  
  const onTrack=isOnTrack(player.x,player.y);
  const maxSpeed=player.boosted>0?.36:(onTrack?.28:.14);
  const accel=onTrack?.012:.005;
  const brake=.018;
  const steerRate=onTrack?3.5:2;
  
  if(player.spinning>0){player.spinning-=dt;player.angle+=dt*8;player.vel*=.92;player.spinning>0&&(player.vel=.05);return updateCarPos(player);}
  
  if(keys['KeyW']||keys['ArrowUp'])player.vel=Math.min(maxSpeed,player.vel+accel);
  else if(keys['KeyS']||keys['ArrowDown'])player.vel=Math.max(-.12,player.vel-brake);
  else player.vel*=.96;
  
  if(player.boosted>0){player.boosted-=dt;if(player.boosted<0)player.boosted=0;}
  
  const steerAmt=(keys['KeyA']||keys['ArrowLeft'])?-1:(keys['KeyD']||keys['ArrowRight'])?1:0;
  if(Math.abs(player.vel)>.01){
    player.angle+=steerAmt*steerRate*dt*Math.min(1,Math.abs(player.vel)/.15);
  }
  
  // Drift effect
  if(Math.abs(steerAmt)>.5&&Math.abs(player.vel)>.15){
    player.driftAngle+=(steerAmt*.4-player.driftAngle)*.15;
    spawnDust(player);
  } else {
    player.driftAngle*=.9;
  }
  
  updateCarPos(player);
  
  // Trail
  player.trail.push({x:player.x,y:player.y,a:1});
  if(player.trail.length>24)player.trail.shift();
  
  // Item pickup
  if(!player.item){
    for(const it of trackItems){
      if(!it.active)continue;
      const dx=it.x-player.x,dy=it.y-player.y;
      if(dx*dx+dy*dy<900){it.active=false;player.item=it.type;document.getElementById('item-slot').textContent=it.type;break;}
    }
  }
  
  // Checkpoint detection
  checkCheckpoints(player);
  
  // HUD
  const spd=Math.floor(Math.abs(player.vel)*600);
  document.getElementById('speed-num').textContent=spd;
  const gears=['R','N','1','2','3','4','5'];
  const gi=Math.floor(player.vel/.06)+2;
  document.getElementById('gear-display').textContent=gears[Math.min(6,Math.max(0,gi))];
  const lt=player.lapTime;document.getElementById('lap-timer').textContent=formatT(lt);
  document.getElementById('lap-num').textContent=Math.min(TOTAL_LAPS,player.lap)+'/'+TOTAL_LAPS;
  updatePositions();
}

function updateCarPos(car){
  const nx=car.x+Math.cos(car.angle)*car.vel*60;
  const ny=car.y+Math.sin(car.angle)*car.vel*60;
  car.x=nx;car.y=ny;
}

function updateAI(dt){
  aiCars.forEach(ai=>{
    const tidx=ai.trackIdx%smoothTrack.length;
    const target=smoothTrack[(tidx+8)%smoothTrack.length];
    const dx=target.x-ai.x,dy=target.y-ai.y;
    const targetAng=Math.atan2(dy,dx);
    let da=targetAng-ai.angle;
    while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
    ai.angle+=da*dt*3.5;
    ai.vel=ai.aiSpeed+Math.sin(ai.wobble+Date.now()*.001)*.02;
    ai.wobble+=dt;
    updateCarPos(ai);
    const nearest=nearestTrackPoint(ai.x,ai.y);
    if(nearest>ai.trackIdx||(ai.trackIdx>smoothTrack.length-10&&nearest<10)){ai.trackIdx=nearest;}
    ai.trackIdx++;if(ai.trackIdx>=smoothTrack.length){ai.trackIdx=0;ai.lap++;}
    checkCheckpoints(ai);
  });
}

function checkCheckpoints(car){
  // Simple checkpoint: nearest track point advancing
  const ni=nearestTrackPoint(car.x,car.y);
  const progress=(ni/smoothTrack.length+car.lap)*smoothTrack.length;
  if(!car._progress)car._progress=progress;
  if(progress-car._progress>smoothTrack.length*.4){
    car.lap++;car._progress=progress;
    if(car===player){
      if(car.lap>1&&car.lapTime<car.bestLap){car.bestLap=car.lapTime;document.getElementById('best-time').textContent='BEST: '+formatT(car.bestLap);}
      car.lapTime=0;
      if(car.lap>TOTAL_LAPS)finishRace();
      else showMsg('LAP '+Math.min(TOTAL_LAPS,car.lap),'#F5C518');
    }
  }
  car._progress=progress;
}

function updatePositions(){
  const allCars=[{...player,name:CU},...aiCars];
  allCars.sort((a,b)=>((b.lap||1)*smoothTrack.length+nearestTrackPoint(b.x,b.y))-((a.lap||1)*smoothTrack.length+nearestTrackPoint(a.x,a.y)));
  const pos=allCars.findIndex(c=>c===player||c.name===CU)+1;
  const suffixes=['st','nd','rd','th'];
  document.getElementById('pos-num').textContent=pos+(suffixes[pos-1]||'th');
}

function spawnDust(car){
  for(let i=0;i<2;i++){particles.push({x:car.x+(Math.random()-.5)*20,y:car.y+(Math.random()-.5)*20,vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,life:1,r:6});}
}

function useItem(){
  if(!player.item)return;
  if(player.item==='⚡'){player.boosted=2;showMsg('BOOST!','#F5C518');}
  else if(player.item==='💣'){for(const ai of aiCars){const dx=ai.x-player.x,dy=ai.y-player.y;if(dx*dx+dy*dy<40000){ai.vel*=-.5;ai.wobble+=5;}}}
  else if(player.item==='🛢️'){/* drop oil - slow enemies nearby */for(const ai of aiCars){const dx=ai.x-player.x,dy=ai.y-player.y;if(dx*dx+dy*dy<20000)ai.vel*=.5;}}
  else if(player.item==='🔵'){player.spinning=1;showMsg('HIT!','#F87171');}// self-item for fun
  player.item=null;document.getElementById('item-slot').textContent='—';
}

let msgTimer=0;
function showMsg(text,color){
  const el=document.getElementById('race-msg');el.textContent=text;el.style.color=color;el.style.opacity=1;
  msgTimer=1.5;
}

function finishRace(){
  player.finished=true;
  document.getElementById('fin-time').textContent=formatT(player.totalTime);
  document.getElementById('fin-best').textContent=player.bestLap<Infinity?formatT(player.bestLap):'—';
  document.getElementById('finish-screen').style.display='flex';
}

function formatT(s){const m=Math.floor(s/60),sec=s%60;return m+':'+(sec<10?'0':'')+sec.toFixed(1);}

// ── CAMERA ──────────────────────────────────────────────────
let camX=0,camY=0;

// ── DRAWING ─────────────────────────────────────────────────
function drawTrack(){
  // Draw track background
  ctx.save();
  // Outer border glow
  ctx.strokeStyle='rgba(245,197,24,.15)';ctx.lineWidth=TRACK_W*2+20;
  ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();smoothTrack.forEach((p,i)=>{const sx=p.x-camX,sy=p.y-camY;i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);});ctx.closePath();ctx.stroke();
  
  // Track surface
  ctx.strokeStyle='#1a1a10';ctx.lineWidth=TRACK_W*2;
  ctx.beginPath();smoothTrack.forEach((p,i)=>{const sx=p.x-camX,sy=p.y-camY;i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);});ctx.closePath();ctx.stroke();
  
  // Track markings
  ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=2;ctx.setLineDash([20,30]);
  ctx.beginPath();smoothTrack.forEach((p,i)=>{const sx=p.x-camX,sy=p.y-camY;i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);});ctx.closePath();ctx.stroke();
  ctx.setLineDash([]);
  
  // Edge stripes
  ctx.strokeStyle='rgba(245,197,24,.2)';ctx.lineWidth=4;
  ctx.beginPath();smoothTrack.forEach((p,i)=>{const sx=p.x-camX,sy=p.y-camY;i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);});ctx.closePath();ctx.stroke();
  
  // Start/finish line
  const sf=smoothTrack[0];
  ctx.fillStyle='rgba(255,255,255,.6)';
  for(let i=0;i<8;i++){ctx.fillStyle=i%2===0?'rgba(255,255,255,.6)':'rgba(0,0,0,.4)';ctx.fillRect(sf.x-camX-TRACK_W+i*TRACK_W/4*2,sf.y-camY-8,TRACK_W/4*2,16);}
  
  ctx.restore();
  
  // Items on track
  trackItems.forEach(it=>{
    if(!it.active)return;
    const sx=it.x-camX,sy=it.y-camY;
    if(sx<-50||sx>W+50||sy<-50||sy>H+50)return;
    const pulse=.8+Math.sin(Date.now()*.006)*.2;
    ctx.save();ctx.globalAlpha=pulse;
    const g=ctx.createRadialGradient(sx,sy,0,sx,sy,22);g.addColorStop(0,'rgba(245,197,24,.3)');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,22,0,Math.PI*2);ctx.fill();
    ctx.font='18px serif';ctx.textAlign='center';ctx.fillText(it.type,sx,sy+6);
    ctx.restore();
  });
}

function drawCar(car,isPlayer){
  const sx=car.x-camX,sy=car.y-camY;
  if(sx<-80||sx>W+80||sy<-80||sy>H+80)return;
  ctx.save();ctx.translate(sx,sy);ctx.rotate(car.angle+Math.PI/2);
  const col=isPlayer?'#F5C518':car.color;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(3,3,16,24,0,0,Math.PI*2);ctx.fill();
  // Car body
  const bodyGrad=ctx.createLinearGradient(-14,0,14,0);bodyGrad.addColorStop(0,col+'88');bodyGrad.addColorStop(.5,col);bodyGrad.addColorStop(1,col+'88');
  ctx.fillStyle=bodyGrad;ctx.beginPath();ctx.roundRect(-14,-22,28,44,5);ctx.fill();
  // Windshield
  ctx.fillStyle='rgba(100,180,255,.35)';ctx.beginPath();ctx.roundRect(-10,-20,20,14,3);ctx.fill();
  // Rear window
  ctx.fillStyle='rgba(100,180,255,.2)';ctx.beginPath();ctx.roundRect(-9,10,18,9,2);ctx.fill();
  // Wheels
  [[11,-18],[11,14],[-11,-18],[-11,14]].forEach(([wx,wy])=>{ctx.fillStyle='#111';ctx.beginPath();ctx.roundRect(wx-4,wy-6,8,12,2);ctx.fill();ctx.fillStyle='#333';ctx.beginPath();ctx.roundRect(wx-2,wy-4,4,8,1);ctx.fill();});
  // Headlights
  if(isPlayer){ctx.fillStyle='rgba(255,255,200,.8)';ctx.fillRect(-10,-24,8,4);ctx.fillRect(2,-24,8,4);}
  // Exhaust flame (boosting)
  if(isPlayer&&player.boosted>0){ctx.fillStyle='rgba(255,150,0,.8)';ctx.beginPath();ctx.ellipse(0,28,6,12,0,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

function drawTrail(){
  for(let i=0;i<player.trail.length-1;i++){
    const a=(i/player.trail.length)*.4;
    ctx.strokeStyle=`rgba(245,197,24,${a})`;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(player.trail[i].x-camX,player.trail[i].y-camY);ctx.lineTo(player.trail[i+1].x-camX,player.trail[i+1].y-camY);ctx.stroke();
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.save();ctx.globalAlpha=p.life*.4;ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(p.x-camX,p.y-camY,p.r*p.life,0,Math.PI*2);ctx.fill();ctx.restore();
    p.x+=p.vx;p.y+=p.vy;p.life-=.05;
  }
  particles.splice(0,particles.length,...particles.filter(p=>p.life>0));
}

function drawBG(){
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
  bg.addColorStop(0,'#0f0d04');bg.addColorStop(1,'#050400');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Grass texture dots
  for(let i=0;i<20;i++){
    const gx=((i*137+camX*.05)%W),gy=((i*89+camY*.05)%H);
    ctx.fillStyle='rgba(74,222,128,.05)';ctx.beginPath();ctx.arc(gx,gy,Math.sin(i)*3+4,0,Math.PI*2);ctx.fill();
  }
}

function drawMinimap(){
  const mc=document.getElementById('mm'),mctx=mc.getContext('2d');
  const mx=300,my=220,mr=55;// approximate bounds
  const scaleX=mr*2/1400,scaleY=mr*2/1000;
  mctx.clearRect(0,0,120,120);
  mctx.fillStyle='rgba(0,0,0,.8)';mctx.fillRect(0,0,120,120);
  // Track
  mctx.strokeStyle='rgba(255,255,255,.3)';mctx.lineWidth=5;mctx.beginPath();
  smoothTrack.forEach((p,i)=>{const sx=(p.x-300)*scaleX+60,sy=(p.y-100)*scaleY+60;i===0?mctx.moveTo(sx,sy):mctx.lineTo(sx,sy);});mctx.closePath();mctx.stroke();
  // AI
  aiCars.forEach(ai=>{const sx=(ai.x-300)*scaleX+60,sy=(ai.y-100)*scaleY+60;mctx.fillStyle=ai.color;mctx.beginPath();mctx.arc(sx,sy,4,0,Math.PI*2);mctx.fill();});
  // Player
  const px=(player.x-300)*scaleX+60,py=(player.y-100)*scaleY+60;
  mctx.fillStyle='#F5C518';mctx.beginPath();mctx.arc(px,py,5,0,Math.PI*2);mctx.fill();
}

let last=0;
function frame(t){
  const dt=Math.min((t-last)/1000,.05);last=t;
  
  if(running){
    if(countdown>0){
      countdown-=dt;
      if(countdown<=0){showMsg('GO!','#4ADE80');}
      else{showMsg(Math.ceil(countdown)+'','#F5C518');}
    }
    if(countdown<=0)updatePlayer(dt);
    updateAI(dt);
    if(msgTimer>0){msgTimer-=dt;if(msgTimer<=0)document.getElementById('race-msg').style.opacity=0;}
    // Camera
    camX+=(player.x-W/2-camX)*.1;
    camY+=(player.y-H/2-camY)*.1;
  }
  
  drawBG();
  drawTrack();
  drawTrail();
  aiCars.forEach(ai=>drawCar(ai,false));
  drawCar(player,true);
  drawParticles();
  drawMinimap();
  requestAnimationFrame(frame);
}

document.getElementById('race-btn').addEventListener('click',()=>{
  document.getElementById('splash').style.display='none';
  running=true;camX=player.x-W/2;camY=player.y-H/2;
  requestAnimationFrame(t=>{last=t;frame(t);});
});
</script>
</body>
